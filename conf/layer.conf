# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-lsmy"
BBFILE_PATTERN_meta-lsmy = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-lsmy = "6"

LAYERDEPENDS_meta-lsmy = "core"
LAYERSERIES_COMPAT_meta-lsmy = "kirkstone"
